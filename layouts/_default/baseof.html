<!DOCTYPE html>
<html lang="{{ with .Site.LanguageCode }}{{ . }}{{ else }}en-US{{ end }}">
    {{- partial "head.html" . -}}
    <body>
        {{- partial "header.html" . -}}
        <main>
            {{- block "main" . }}{{- end }}
        </main>
        {{- partial "footer.html" . -}}

        {{ if .IsHome }}
            {{ with resources.Get "js/home.js" | minify }}
                <script src="{{ .RelPermalink }}"></script>
            {{ end }}
        {{end}}
        
    </body>
</html>
