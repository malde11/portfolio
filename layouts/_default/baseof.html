<!DOCTYPE html>
<html lang="{{ with .Site.LanguageCode }}{{ . }}{{ else }}en-US{{ end }}">
    {{- partial "head.html" . -}}
    <body>
        {{- partial "header.html" . -}}
        <main>
            {{- block "main" . }}{{- end }}
        </main>
        {{- partial "footer.html" . -}}

        {{ if .Store.Get "video" }}
            {{ with resources.Get "js/video.js" | minify }}
                <script src="{{ .RelPermalink }}"></script>
            {{ end }}   
        {{ end }}

    </body>
</html>
